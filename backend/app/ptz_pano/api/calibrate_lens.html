<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Lens Calibration - PTZ Pano</title>
    <style>
      body { font-family: sans-serif; background: #111; color: #eee; padding: 20px; }
      .container { max-width: 800px; margin: 0 auto; text-align: center; }
      .preview { width: 100%; border: 2px solid #444; margin-top: 10px; background: #000; min-height: 400px; }
      .controls { margin-top: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      button { padding: 15px; font-size: 16px; cursor: pointer; background: #333; color: white; border: 1px solid #555; }
      button:active { background: #555; }
      .capture-btn { background: #1f7a4d; grid-column: span 3; font-weight: bold; }
      .capture-btn:disabled { background: #444; }
      .status { margin-top: 10px; font-size: 18px; }
      .found { color: #00ff00; }
      .not-found { color: #ff3333; }
      .zoom-info { font-size: 24px; font-family: monospace; margin: 10px 0; color: #00ff00; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Калибровка линзы</h1>
      <div style="margin-bottom: 20px;">
        <a href="/chessboard" target="_blank" style="color: #00ff00; text-decoration: none; border: 1px solid #00ff00; padding: 5px 10px; border-radius: 5px;">ОТКРЫТЬ СЕТКУ (для iPad)</a>
      </div>
      <div id="zoomInfo" class="zoom-info">Zoom: ---</div>
      <div id="status" class="status">Ожидание...</div>
      <img id="preview" class="preview" alt="Предпросмотр появится здесь" />
      
      <div class="controls">
        <button onclick="move(0, 100)">Вверх</button>
        <button onclick="move(0, -100)">Вниз</button>
        <button onclick="move(-200, 0)">Влево</button>
        <button onclick="move(200, 0)">Вправо</button>
        <button onclick="zoom(500)">Zoom +</button>
        <button onclick="zoom(-500)">Zoom -</button>
        <button id="captureBtn" class="capture-btn" onclick="capture()">ЗАХВАТИТЬ КАДР ДЛЯ КАЛИБРОВКИ</button>
      </div>
      
      <p>Наведите камеру на шахматную доску так, чтобы она была видна целиком. <br> Сделайте 10-15 снимков для каждого уровня зума в разных частях кадра.</p>
    </div>

    <script>
      let currentZoom = 0;

      async function updateStatus() {
        try {
          const res = await fetch("/camera/status");
          const data = await res.json();
          currentZoom = data.zoom;
          document.getElementById("zoomInfo").textContent = `Zoom: ${data.zoom}`;
        } catch (e) {}
      }

      setInterval(updateStatus, 2000);
      updateStatus();

      async function move(dp, dt) {
        const res = await fetch("/camera/status");
        const data = await res.json();
        await fetch("/camera/target", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            yaw_deg: 0, pitch_deg: 0, target_hfov_deg: 40, execute: false // Placeholder
          })
        });
        // Для простоты здесь можно было бы добавить относительное движение,
        // но пока просто используем существующий API для получения позы
        alert("Используйте пульт или основной интерфейс для наведения. Здесь только захват.");
      }

      async function capture() {
        const btn = document.getElementById("captureBtn");
        const status = document.getElementById("status");
        const preview = document.getElementById("preview");
        
        btn.disabled = true;
        status.textContent = "Захват...";
        
        try {
          const res = await fetch("/calibration/lens/capture", { method: "POST" });
          const data = await res.json();
          
          preview.src = data.preview_url + "?t=" + Date.now();
          if (data.found) {
            status.innerHTML = `<span class="found">ДОСКА НАЙДЕНА! (Zoom: ${data.zoom}, ${data.detector})</span>`;
          } else {
            status.innerHTML = `<span class="not-found">ДОСКА НЕ НАЙДЕНА. Нужны все внутренние углы целиком, без перекрытия нижнего или бокового ряда.</span>`;
          }
        } catch (e) {
          status.textContent = "Ошибка: " + e.message;
        } finally {
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
