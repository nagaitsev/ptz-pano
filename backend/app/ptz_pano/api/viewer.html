<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PTZ Pano</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050505;
        color: #f4f4f4;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        touch-action: none;
      }

      body {
        background: #050505;
      }

      #viewport {
        position: fixed;
        inset: 0;
        overflow: hidden;
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      #viewport.dragging {
        cursor: grabbing;
      }

      #panorama {
        position: absolute;
        left: 0;
        top: 0;
        transform-origin: 0 0;
        will-change: transform;
        pointer-events: none;
        max-width: none;
      }

      #grid-container {
        position: absolute;
        left: 0;
        top: 0;
        transform-origin: 0 0;
        pointer-events: none;
      }

      .frame-rect {
        position: absolute;
        border: 1px solid rgba(255, 255, 0, 0.4);
        background: rgba(255, 255, 0, 0.05);
        pointer-events: auto;
        cursor: crosshair;
      }

      .frame-rect:hover {
        border-color: rgba(255, 255, 0, 0.9);
        background: rgba(255, 255, 0, 0.15);
      }

      .frame-rect.active {
        border-color: #00ff00;
        background: rgba(0, 255, 0, 0.1);
        border-width: 2px;
      }

      .correction-marker {
        position: absolute;
        width: 12px;
        height: 12px;
        background: #00ff00;
        border: 2px solid white;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        box-shadow: 0 0 5px rgba(0,0,0,0.8);
        z-index: 10;
      }

      .frame-label {
        position: absolute;
        left: 2px;
        top: 2px;
        font-size: 9px;
        color: yellow;
        opacity: 0.7;
      }

      .reticle {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 46px;
        height: 46px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .reticle::before,
      .reticle::after {
        content: "";
        position: absolute;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 2px rgba(0, 0, 0, 0.9);
      }

      .reticle::before {
        left: 22px;
        top: 0;
        width: 2px;
        height: 46px;
      }

      .reticle::after {
        left: 0;
        top: 22px;
        width: 46px;
        height: 2px;
      }

      .toolbar {
        position: fixed;
        left: max(16px, env(safe-area-inset-left));
        right: max(16px, env(safe-area-inset-right));
        bottom: max(16px, env(safe-area-inset-bottom));
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        pointer-events: none;
        z-index: 100;
      }

      .toolbar button,
      .toolbar .readout,
      .toolbar .scale-control,
      .toolbar .offset-control,
      .settings-panel {
        pointer-events: auto;
      }

      button {
        min-height: 44px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 8px;
        background: rgba(12, 12, 12, 0.82);
        color: #f7f7f7;
        font: inherit;
        font-weight: 650;
        padding: 0 16px;
      }

      button:active {
        transform: translateY(1px);
      }

      .zoom-button {
        width: 48px;
        padding: 0;
        font-size: 22px;
      }

      #targetButton {
        background: #1f7a4d;
        border-color: rgba(255, 255, 255, 0.32);
        white-space: nowrap;
      }

      .readout {
        min-height: 44px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(12, 12, 12, 0.72);
        color: rgba(255, 255, 255, 0.86);
        overflow: hidden;
        white-space: nowrap;
        font-size: 14px;
      }

      .scale-control {
        min-height: 44px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 8px;
        align-items: center;
        padding: 0 10px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(12, 12, 12, 0.72);
        color: rgba(255, 255, 255, 0.86);
        font-size: 13px;
      }

      .offset-control {
        min-height: 44px;
        display: grid;
        grid-template-columns: auto 1fr auto 1fr;
        gap: 8px;
        align-items: center;
        padding: 0 10px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(12, 12, 12, 0.72);
        color: rgba(255, 255, 255, 0.86);
        font-size: 13px;
      }

      .offset-control input {
        width: 100%;
        min-width: 0;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.28);
        color: #fff;
        font: inherit;
        padding: 6px;
      }

      .scale-control input {
        width: 100%;
        accent-color: #1f7a4d;
      }

      #scaleValue {
        min-width: 42px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .topline {
        position: fixed;
        left: max(16px, env(safe-area-inset-left));
        right: max(16px, env(safe-area-inset-right));
        top: max(16px, env(safe-area-inset-top));
        display: flex;
        justify-content: space-between;
        gap: 8px;
        pointer-events: none;
      }

      .badge {
        max-width: 100%;
        min-height: 36px;
        display: flex;
        align-items: center;
        padding: 0 10px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(12, 12, 12, 0.58);
        color: rgba(255, 255, 255, 0.82);
        font-size: 13px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .settings-panel {
        position: fixed;
        right: max(16px, env(safe-area-inset-right));
        bottom: calc(max(16px, env(safe-area-inset-bottom)) + 64px);
        width: min(420px, calc(100vw - 32px));
        display: none;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: rgba(12, 12, 12, 0.92);
        color: rgba(255, 255, 255, 0.9);
        z-index: 150;
      }

      .settings-panel.open {
        display: block;
      }

      .settings-panel h2 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .settings-panel label {
        display: grid;
        gap: 4px;
        margin: 8px 0;
        font-size: 13px;
      }

      .settings-panel input,
      .settings-panel select {
        min-height: 38px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.36);
        color: #fff;
        font: inherit;
        padding: 6px 8px;
      }

      .settings-note {
        margin: 8px 0;
        font-size: 12px;
        line-height: 1.35;
        color: rgba(255, 255, 255, 0.68);
      }

      .settings-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .settings-status {
        margin-top: 10px;
        min-height: 36px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 6px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.78);
      }

      @media (max-width: 720px) {
        .toolbar {
          grid-template-columns: 48px 48px 1fr;
        }

        .scale-control {
          grid-column: 1 / -1;
        }

        .offset-control {
          grid-column: 1 / -1;
        }

        #targetButton {
          grid-column: 1 / -1;
        }

        .readout {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main id="viewport" aria-label="Панорама">
      <img id="panorama" alt="" decoding="async" draggable="false" />
      <div id="grid-container"></div>
    </main>
    <div class="reticle" aria-hidden="true"></div>
    <div class="topline">
      <div id="scanBadge" class="badge">Загрузка</div>
      <div id="coverageBadge" class="badge"></div>
      <div id="telemetry" class="badge" style="color: #00ff00; font-family: monospace;">P: 0 T: 0 Z: 0</div>
    </div>
    <div class="toolbar">
      <button id="toggleGrid" type="button" style="padding: 0 8px; font-size: 11px;">Сетка</button>
      <button id="settingsButton" type="button" style="padding: 0 10px; font-size: 12px;">Настройки</button>
      <button id="adjustButton" type="button" style="display: none; background: #7a1f1f; border-color: rgba(255, 255, 255, 0.32);">Привязать к центру</button>
      <button id="clearAdjustments" type="button" style="display: none; background: #444; border-color: rgba(255, 255, 255, 0.2);">Очистить</button>
      <div id="calibrationReadout" class="readout" style="display: none; border-color: #7a1f1f; color: #ff9999; font-family: monospace; font-size: 11px;"></div>
      <button id="zoomOut" class="zoom-button" type="button">-</button>
      <button id="zoomIn" class="zoom-button" type="button">+</button>
      <label class="scale-control">
        <span>k</span>
        <input id="hfovScale" type="range" min="0.2" max="1.1" step="0.05" value="0.45" />
        <span id="scaleValue">0.45</span>
      </label>
      <label class="offset-control">
        <span>yaw</span>
        <input id="yawOffset" type="number" min="-20" max="20" step="0.5" value="0" />
        <span>pitch</span>
        <input id="pitchOffset" type="number" min="-20" max="20" step="0.5" value="0" />
      </label>
      <div id="readout" class="readout">yaw 0.0 / pitch 0.0</div>
      <button id="targetButton" type="button">Навести камеру</button>
    </div>
    <section id="settingsPanel" class="settings-panel" aria-label="Настройки">
      <h2>Настройки</h2>
      <label>
        ID новой съемки
        <input id="settingsScanId" type="text" placeholder="scan_20260418_120000" />
      </label>
      <label>
        Горизонтальный угол съемки, °
        <input id="settingsHorizontalAngle" type="number" min="1" max="360" step="1" placeholder="по конфигу" />
      </label>
      <label>
        Вертикальный угол съемки, °
        <input id="settingsVerticalAngle" type="number" min="1" max="180" step="1" placeholder="по конфигу" />
      </label>
      <label>
        Порядок съемки
        <select id="settingsScanOrder">
          <option value="column_snake" selected>снизу вверх, потом сверху вниз</option>
          <option value="row_snake">по рядам слева направо</option>
        </select>
      </label>
      <p class="settings-note">
        Если угол задан, текущая позиция камеры будет центром зоны съемки.
      </p>
      <label>
        Проекция
        <select id="settingsProjection">
          <option value="sphere" selected>sphere</option>
          <option value="angular">angular</option>
        </select>
      </label>
      <label>
        Склейка
        <select id="settingsStrategy">
          <option value="max_weight" selected>max_weight</option>
          <option value="average">average</option>
        </select>
      </label>
      <label>
        <span>
          <input id="settingsUseLens" type="checkbox" checked />
          использовать lens calibration
        </span>
      </label>
      <div class="settings-actions">
        <button id="stitchButton" type="button">Склеить текущую</button>
        <button id="scanAndStitchButton" type="button">Снять и склеить</button>
        <button id="settingsClose" type="button">Закрыть</button>
      </div>
      <div id="settingsStatus" class="settings-status">Готово</div>
    </section>

    <script>
      const viewport = document.querySelector("#viewport");
      const image = document.querySelector("#panorama");
      const gridContainer = document.querySelector("#grid-container");
      const readout = document.querySelector("#readout");
      const telemetry = document.querySelector("#telemetry");
      const scanBadge = document.querySelector("#scanBadge");
      const coverageBadge = document.querySelector("#coverageBadge");
      const targetButton = document.querySelector("#targetButton");
      const settingsButton = document.querySelector("#settingsButton");
      const settingsPanel = document.querySelector("#settingsPanel");
      const settingsClose = document.querySelector("#settingsClose");
      const settingsScanId = document.querySelector("#settingsScanId");
      const settingsHorizontalAngle = document.querySelector("#settingsHorizontalAngle");
      const settingsVerticalAngle = document.querySelector("#settingsVerticalAngle");
      const settingsScanOrder = document.querySelector("#settingsScanOrder");
      const settingsProjection = document.querySelector("#settingsProjection");
      const settingsStrategy = document.querySelector("#settingsStrategy");
      const settingsUseLens = document.querySelector("#settingsUseLens");
      const settingsStatus = document.querySelector("#settingsStatus");
      const stitchButton = document.querySelector("#stitchButton");
      const scanAndStitchButton = document.querySelector("#scanAndStitchButton");
      const toggleGridButton = document.querySelector("#toggleGrid");
      const adjustButton = document.querySelector("#adjustButton");
      const clearAdjustmentsButton = document.querySelector("#clearAdjustments");
      const calibrationReadout = document.querySelector("#calibrationReadout");
      const zoomInButton = document.querySelector("#zoomIn");
      const zoomOutButton = document.querySelector("#zoomOut");
      const hfovScaleInput = document.querySelector("#hfovScale");
      const scaleValue = document.querySelector("#scaleValue");
      const scaleStorageKey = "ptz-pano-target-hfov-scale";
      const yawOffsetInput = document.querySelector("#yawOffset");
      const pitchOffsetInput = document.querySelector("#pitchOffset");
      const yawOffsetStorageKey = "ptz-pano-yaw-offset";
      const pitchOffsetStorageKey = "ptz-pano-pitch-offset";

      const state = {
        scanId: null,
        info: null,
        scanData: null,
        corrections: [],
        showGrid: false,
        activeFrame: null,
        lastCameraPose: { pan: 0, tilt: 0, zoom: 0 },
        scale: 1,
        minScale: 1,
        maxScale: 12,
        x: 0,
        y: 0,
        pointers: new Map(),
        gesture: null,
      };

      init().catch((error) => {
        scanBadge.textContent = "Ошибка загрузки";
        readout.textContent = error.message;
      });

      async function init() {
        const params = new URLSearchParams(location.search);
        state.scanId = params.get("scan");
        if (!state.scanId) {
          const latest = await fetchJson("/api/latest-scan");
          state.scanId = latest.id;
        }

        state.info = await fetchJson(`/scans/${state.scanId}/panorama-info`);
        state.scanData = await fetchJson(`/scans/${state.scanId}`);
        await loadAdjustments();

        const savedScaleRaw = localStorage.getItem(scaleStorageKey);
        const savedScale = savedScaleRaw === null ? NaN : Number(savedScaleRaw);
        const initialScale = Number.isFinite(savedScale) ? savedScale : state.info.target_hfov_scale ?? 0.45;
        setHfovScale(initialScale);
        setOffset(yawOffsetInput, localStorage.getItem(yawOffsetStorageKey) ?? "0");
        setOffset(pitchOffsetInput, localStorage.getItem(pitchOffsetStorageKey) ?? "0");
        scanBadge.textContent = state.scanId;
        coverageBadge.textContent = `${state.info.coverage_percent.toFixed(1)}%`;
        await loadPanoramaImage(`${state.info.preview_url}?t=${Date.now()}`);
        resetView();
        bindEvents();
        update();
        startTelemetryLoop();
      }

      function bindEvents() {
        addEventListener("resize", () => {
          resetView();
          update();
        });

        toggleGridButton.addEventListener("click", () => {
          state.showGrid = !state.showGrid;
          toggleGridButton.style.background = state.showGrid ? "#1f7a4d" : "";
          
          const display = state.showGrid ? "block" : "none";
          adjustButton.style.display = display;
          clearAdjustmentsButton.style.display = display;
          calibrationReadout.style.display = display;
          
          renderGrid();
        });

        settingsButton.addEventListener("click", () => {
          settingsPanel.classList.toggle("open");
          if (!settingsScanId.value) {
            settingsScanId.value = defaultScanId();
          }
        });
        settingsClose.addEventListener("click", () => settingsPanel.classList.remove("open"));
        stitchButton.addEventListener("click", () => startStitchJob());
        scanAndStitchButton.addEventListener("click", () => startScanAndStitchJob());

        clearAdjustmentsButton.addEventListener("click", async () => {
          if (!confirm("Удалить все сохраненные точки коррекции?")) return;
          try {
            await fetchJson("/calibration/adjustments", { method: "DELETE" });
            state.corrections = [];
            renderGrid();
          } catch (e) {
            alert("Ошибка: " + e.message);
          }
        });

        adjustButton.addEventListener("click", async () => {
          const target = currentTarget();
          console.log("Binding current camera to reticle:", target.yaw_deg, target.pitch_deg);
          
          adjustButton.disabled = true;
          try {
            await fetchJson("/calibration/adjust", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                scan_id: state.scanId,
                frame_index: 0, // 0 означает произвольную точку
                yaw_deg: target.yaw_deg,
                pitch_deg: target.pitch_deg,
                pan: state.lastCameraPose.pan,
                tilt: state.lastCameraPose.tilt,
                zoom: state.lastCameraPose.zoom
              }),
            });
            await loadAdjustments();
            adjustButton.style.background = "#1f7a4d";
            setTimeout(() => { adjustButton.style.background = "#7a1f1f"; }, 1000);
            renderGrid();
            alert(`Точка привязана к Yaw: ${target.yaw_deg.toFixed(1)}, Pitch: ${target.pitch_deg.toFixed(1)}`);
          } catch (e) {
            alert("Ошибка сохранения: " + e.message);
          } finally {
            adjustButton.disabled = false;
          }
        });

        viewport.addEventListener("wheel", (event) => {
          event.preventDefault();
          const factor = event.deltaY < 0 ? 1.18 : 1 / 1.18;
          zoomAt(event.clientX, event.clientY, factor);
        }, { passive: false });

        viewport.addEventListener("pointerdown", (event) => {
          viewport.setPointerCapture(event.pointerId);
          state.pointers.set(event.pointerId, point(event));
          viewport.classList.add("dragging");
          startGesture();
        });

        viewport.addEventListener("pointermove", (event) => {
          if (!state.pointers.has(event.pointerId)) return;
          state.pointers.set(event.pointerId, point(event));
          moveGesture();
        });

        for (const name of ["pointerup", "pointercancel", "lostpointercapture"]) {
          viewport.addEventListener(name, (event) => {
            state.pointers.delete(event.pointerId);
            if (state.pointers.size === 0) {
              viewport.classList.remove("dragging");
            }
            startGesture();
          });
        }

        zoomInButton.addEventListener("click", () => zoomAt(innerWidth / 2, innerHeight / 2, 1.35));
        zoomOutButton.addEventListener("click", () => zoomAt(innerWidth / 2, innerHeight / 2, 1 / 1.35));
        targetButton.addEventListener("click", moveCamera);
        hfovScaleInput.addEventListener("input", () => {
          setHfovScale(Number(hfovScaleInput.value));
          localStorage.setItem(scaleStorageKey, hfovScaleInput.value);
          update();
        });
        yawOffsetInput.addEventListener("input", () => {
          setOffset(yawOffsetInput, yawOffsetInput.value);
          localStorage.setItem(yawOffsetStorageKey, yawOffsetInput.value);
          update();
        });
        pitchOffsetInput.addEventListener("input", () => {
          setOffset(pitchOffsetInput, pitchOffsetInput.value);
          localStorage.setItem(pitchOffsetStorageKey, pitchOffsetInput.value);
          update();
        });
      }

      function resetView() {
        const fitScale = Math.max(innerWidth / image.naturalWidth, innerHeight / image.naturalHeight);
        state.minScale = fitScale;
        state.maxScale = fitScale * 16;
        state.scale = fitScale;
        state.x = (innerWidth - image.naturalWidth * state.scale) / 2;
        state.y = (innerHeight - image.naturalHeight * state.scale) / 2;
        clampOffset();
      }

      function startGesture() {
        const points = [...state.pointers.values()];
        if (points.length === 1) {
          state.gesture = {
            type: "pan",
            start: points[0],
            x: state.x,
            y: state.y,
          };
        } else if (points.length >= 2) {
          const pair = [points[0], points[1]];
          state.gesture = {
            type: "pinch",
            center: midpoint(pair),
            distance: distance(pair),
            scale: state.scale,
            imagePoint: screenToImage(midpoint(pair)),
          };
        } else {
          state.gesture = null;
        }
      }

      function moveGesture() {
        if (!state.gesture) return;
        const points = [...state.pointers.values()];
        if (state.gesture.type === "pan" && points.length === 1) {
          const current = points[0];
          state.x = state.gesture.x + current.x - state.gesture.start.x;
          state.y = state.gesture.y + current.y - state.gesture.start.y;
          clampOffset();
          update();
        }
        if (state.gesture.type === "pinch" && points.length >= 2) {
          const pair = [points[0], points[1]];
          const center = midpoint(pair);
          const factor = distance(pair) / state.gesture.distance;
          state.scale = clamp(state.gesture.scale * factor, state.minScale, state.maxScale);
          state.x = center.x - state.gesture.imagePoint.x * state.scale;
          state.y = center.y - state.gesture.imagePoint.y * state.scale;
          clampOffset();
          update();
        }
      }

      function zoomAt(screenX, screenY, factor) {
        const before = screenToImage({ x: screenX, y: screenY });
        state.scale = clamp(state.scale * factor, state.minScale, state.maxScale);
        state.x = screenX - before.x * state.scale;
        state.y = screenY - before.y * state.scale;
        clampOffset();
        update();
      }

      async function moveCamera() {
        const target = currentTarget();
        targetButton.disabled = true;
        targetButton.textContent = "Наведение";
        try {
          const response = await fetchJson("/camera/target", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ...target, execute: true }),
          });
          const pose = response.command_pose;
          readout.textContent = `pan ${pose.pan} / tilt ${pose.tilt} / zoom ${pose.zoom}`;
        } catch (error) {
          readout.textContent = error.message;
        } finally {
          targetButton.disabled = false;
          targetButton.textContent = "Навести камеру";
        }
      }

      async function startStitchJob() {
        setSettingsBusy(true, "Запуск склейки текущей панорамы...");
        try {
          const response = await fetchJson("/api/stitch", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              scan_id: state.scanId,
              projection: settingsProjection.value,
              strategy: settingsStrategy.value,
              use_lens_calibration: settingsUseLens.checked,
            }),
          });
          monitorJob(response.job_id);
        } catch (error) {
          setSettingsBusy(false, error.message);
        }
      }

      async function startScanAndStitchJob() {
        const scanId = settingsScanId.value.trim() || defaultScanId();
        let horizontalAngleDeg = null;
        let verticalAngleDeg = null;
        try {
          horizontalAngleDeg = readOptionalPositiveNumber(settingsHorizontalAngle, "Горизонтальный угол", 360);
          verticalAngleDeg = readOptionalPositiveNumber(settingsVerticalAngle, "Вертикальный угол", 180);
        } catch (error) {
          setSettingsBusy(false, error.message);
          return;
        }
        settingsScanId.value = scanId;
        setSettingsBusy(true, `Запуск съемки ${scanId}...`);
        try {
          const body = {
            scan_id: scanId,
            stitch_after: true,
            projection: settingsProjection.value,
            strategy: settingsStrategy.value,
            scan_order: settingsScanOrder.value,
            use_lens_calibration: settingsUseLens.checked,
          };
          if (horizontalAngleDeg !== null) {
            body.horizontal_angle_deg = horizontalAngleDeg;
          }
          if (verticalAngleDeg !== null) {
            body.vertical_angle_deg = verticalAngleDeg;
          }
          const response = await fetchJson("/api/scan-and-stitch", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          monitorJob(response.job_id);
        } catch (error) {
          setSettingsBusy(false, error.message);
        }
      }

      function readOptionalPositiveNumber(input, label, max) {
        const rawValue = input.value.trim();
        if (!rawValue) return null;
        const value = Number(rawValue.replace(",", "."));
        if (!Number.isFinite(value) || value <= 0 || value > max) {
          throw new Error(`${label}: введите число от 1 до ${max}`);
        }
        return value;
      }

      function monitorJob(jobId) {
        const timer = setInterval(async () => {
          try {
            const job = await fetchJson(`/api/jobs/${jobId}`);
            if (job.status === "running" || job.status === "queued") {
              settingsStatus.textContent = `${job.kind}: ${job.status}`;
              return;
            }
            clearInterval(timer);
            if (job.status === "done") {
              const scanId = job.result?.scan_id || job.result?.panorama?.scan_id || state.scanId;
              settingsStatus.textContent = `Готово: ${scanId}. Обновляю панораму...`;
              setTimeout(() => {
                location.href = `/?scan=${encodeURIComponent(scanId)}&t=${Date.now()}`;
              }, 700);
              return;
            }
            setSettingsBusy(false, `Ошибка: ${job.error || "неизвестная ошибка"}`);
          } catch (error) {
            clearInterval(timer);
            setSettingsBusy(false, error.message);
          }
        }, 1000);
      }

      function setSettingsBusy(isBusy, message) {
        settingsStatus.textContent = message;
        stitchButton.disabled = isBusy;
        scanAndStitchButton.disabled = isBusy;
      }

      function defaultScanId() {
        const now = new Date();
        const pad = (value) => String(value).padStart(2, "0");
        return `scan_${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      }

      function update() {
        image.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
        gridContainer.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
        const target = currentTarget();
        readout.textContent =
          `yaw ${target.yaw_deg.toFixed(1)} / pitch ${target.pitch_deg.toFixed(1)} / fov ${target.target_hfov_deg.toFixed(1)}`;
      }

      function currentTarget() {
        const center = screenToImage({ x: innerWidth / 2, y: innerHeight / 2 });
        const x = clamp(center.x, 0, image.naturalWidth - 1);
        const y = clamp(center.y, 0, image.naturalHeight - 1);
        const bbox = state.info.content_bbox;
        const panoramaSize = state.info.panorama_size;
        const bboxWidth = bbox[2] - bbox[0] + 1;
        const bboxHeight = bbox[3] - bbox[1] + 1;
        const fullX = bbox[0] + (x / image.naturalWidth) * bboxWidth;
        const fullY = bbox[1] + (y / image.naturalHeight) * bboxHeight;
        const visiblePreviewWidth = Math.min(innerWidth / state.scale, image.naturalWidth);
        const visibleFullWidth = (visiblePreviewWidth / image.naturalWidth) * bboxWidth;
        const targetHfovScale = Number(hfovScaleInput.value);
        const targetHfov = clamp((visibleFullWidth / panoramaSize[0]) * 360 * targetHfovScale, 2, 120);
        return {
          yaw_deg: clamp((fullX / panoramaSize[0]) * 360 - 180 + Number(yawOffsetInput.value), -180, 180),
          pitch_deg: clamp(90 - (fullY / panoramaSize[1]) * 180 + Number(pitchOffsetInput.value), -90, 90),
          target_hfov_deg: targetHfov,
        };
      }

      function screenToImage(pointValue) {
        return {
          x: (pointValue.x - state.x) / state.scale,
          y: (pointValue.y - state.y) / state.scale,
        };
      }

      function clampOffset() {
        const scaledWidth = image.naturalWidth * state.scale;
        const scaledHeight = image.naturalHeight * state.scale;
        if (scaledWidth <= innerWidth) {
          state.x = (innerWidth - scaledWidth) / 2;
        } else {
          state.x = clamp(state.x, innerWidth - scaledWidth, 0);
        }
        if (scaledHeight <= innerHeight) {
          state.y = (innerHeight - scaledHeight) / 2;
        } else {
          state.y = clamp(state.y, innerHeight - scaledHeight, 0);
        }
      }

      function point(event) {
        return { x: event.clientX, y: event.clientY };
      }

      function midpoint(points) {
        return {
          x: (points[0].x + points[1].x) / 2,
          y: (points[0].y + points[1].y) / 2,
        };
      }

      function distance(points) {
        return Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
      }

      function clamp(value, low, high) {
        return Math.max(low, Math.min(high, value));
      }

      function setHfovScale(value) {
        const scale = clamp(value, Number(hfovScaleInput.min), Number(hfovScaleInput.max));
        hfovScaleInput.value = scale.toFixed(2);
        scaleValue.textContent = scale.toFixed(2);
      }

      function setOffset(input, value) {
        const numeric = Number(value);
        const offset = Number.isFinite(numeric)
          ? clamp(numeric, Number(input.min), Number(input.max))
          : 0;
        input.value = offset.toFixed(1);
      }

      async function loadPanoramaImage(url) {
        image.src = url;
        if (!image.complete || image.naturalWidth === 0) {
          await new Promise((resolve, reject) => {
            image.onload = resolve;
            image.onerror = () => reject(new Error("Не удалось загрузить preview.jpg"));
          });
        }
        if (image.decode) {
          await image.decode().catch(() => {});
        }
      }

      function renderGrid() {
        gridContainer.innerHTML = "";
        
        // Обновляем статистику калибровки
        if (state.corrections.length > 0) {
          let avgDP = 0, avgDT = 0, avgDZ = 0;
          state.corrections.forEach(c => {
            // Упрощенно: считаем среднее отклонение
            avgDP += (c.pan / (c.yaw_deg || 1)); // Это коэффициент pan_units
            avgDT += (c.tilt / (c.pitch_deg || 1));
            avgDZ += c.zoom; // Просто для справки
          });
          const count = state.corrections.length;
          calibrationReadout.textContent = `Pts: ${count} | P_u: ${(avgDP/count).toFixed(1)} | T_u: ${(avgDT/count).toFixed(1)}`;
        } else {
          calibrationReadout.textContent = "Нет данных калибровки";
        }

        if (!state.showGrid || !state.scanData) return;

        const bbox = state.info.content_bbox;
        const panoramaSize = state.info.panorama_size;
        const bboxWidth = bbox[2] - bbox[0] + 1;
        const bboxHeight = bbox[3] - bbox[1] + 1;

        state.scanData.frames.forEach((frame) => {
          const yaw = frame.pose.yaw_deg;
          const pitch = frame.pose.pitch_deg;
          const hfov = frame.hfov_deg;
          const vfov = frame.vfov_deg;

          if (yaw === null || pitch === null || hfov === null || vfov === null) return;

          const fullX = (yaw + 180) / 360 * panoramaSize[0];
          const fullY = (90 - pitch) / 180 * panoramaSize[1];
          const x = (fullX - bbox[0]) / bboxWidth * image.naturalWidth;
          const y = (fullY - bbox[1]) / bboxHeight * image.naturalHeight;
          const w = (hfov / 360 * panoramaSize[0]) / bboxWidth * image.naturalWidth;
          const h = (vfov / 180 * panoramaSize[1]) / bboxHeight * image.naturalHeight;

          const rect = document.createElement("div");
          rect.className = "frame-rect" + (state.activeFrame === frame ? " active" : "");
          rect.style.left = `${x - w/2}px`;
          rect.style.top = `${y - h/2}px`;
          rect.style.width = `${w}px`;
          rect.style.height = `${h}px`;
          
          rect.innerHTML = `<span class="frame-label">${frame.index}</span>`;
          rect.title = `F${frame.index}: P${frame.pose.pan} T${frame.pose.tilt} Z${frame.pose.zoom}`;
          
          rect.onclick = (e) => {
            e.stopPropagation();
            console.log("Frame clicked:", frame.index);
            state.activeFrame = frame;
            adjustButton.textContent = `Привязать к F${frame.index}`;
            renderGrid();
            moveCameraToPose(yaw, pitch, hfov);
          };

          gridContainer.appendChild(rect);
        });

        // Рисуем точки коррекции
        state.corrections.forEach((c) => {
          const fullX = (c.yaw_deg + 180) / 360 * panoramaSize[0];
          const fullY = (90 - c.pitch_deg) / 180 * panoramaSize[1];
          const x = (fullX - bbox[0]) / bboxWidth * image.naturalWidth;
          const y = (fullY - bbox[1]) / bboxHeight * image.naturalHeight;

          const marker = document.createElement("div");
          marker.className = "correction-marker";
          marker.style.left = `${x}px`;
          marker.style.top = `${y}px`;
          marker.title = `Привязка F${c.frame_index}: P${c.pan} T${c.tilt} Z${c.zoom}`;
          gridContainer.appendChild(marker);
        });

        update();
      }

      async function loadAdjustments() {
        try {
          state.corrections = await fetchJson("/calibration/adjustments");
        } catch (e) {
          console.error("Failed to load adjustments", e);
        }
      }

      async function moveCameraToPose(yaw, pitch, hfov) {
        targetButton.disabled = true;
        targetButton.textContent = "Наведение";
        try {
          const response = await fetchJson("/camera/target", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
              yaw_deg: yaw, 
              pitch_deg: pitch, 
              target_hfov_deg: hfov, 
              execute: true 
            }),
          });
          const pose = response.actual_pose || response.command_pose;
          readout.textContent = `P ${pose.pan} / T ${pose.tilt} / Z ${pose.zoom}`;
        } catch (error) {
          readout.textContent = error.message;
        } finally {
          targetButton.disabled = false;
          targetButton.textContent = "Навести камеру";
        }
      }

      function startTelemetryLoop() {
        setInterval(async () => {
          try {
            const pose = await fetchJson("/camera/status");
            state.lastCameraPose = pose;
            telemetry.textContent = `P: ${pose.pan} T: ${pose.tilt} Z: ${pose.zoom}`;
          } catch (e) {
            telemetry.textContent = "Offline";
          }
        }, 1000);
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        if (!response.ok) {
          const body = await response.text();
          throw new Error(body || response.statusText);
        }
        return response.json();
      }
    </script>
  </body>
